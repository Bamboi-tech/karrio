---
# One-shot OS hardening for staging/production Google VMs.
#
# Local:
#   ansible-playbook vm-hardening.yaml -e env=staging
#   ansible-playbook vm-hardening.yaml -e env=production
#   ansible-playbook vm-hardening.yaml -e env=staging -e force_hardening=true
#
# By default, hosts with /var/lib/ansible-vm-hardening-v1.complete are skipped.
- name: Harden Google VM (one-shot)
  hosts: "{{ env | default('staging') }}"
  become: true
  gather_facts: true
  vars_files:
    - vars/vm_hardening.yaml
  pre_tasks:
    - name: Load environment vars
      ansible.builtin.include_vars: "vars/{{ env | default('staging') }}.yaml"

    - name: Show hardening target
      ansible.builtin.debug:
        msg: >-
          Applying OS hardening on {{ inventory_hostname }}
          (env={{ env | default('staging') }},
          force={{ force_hardening | default(false) }})

  tasks:
    - name: Apply VM hardening tasks
      ansible.builtin.import_tasks: tasks/vm_hardening.yml

  handlers:
    - name: Restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted

    - name: Restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted

    - name: Apply sysctl
      ansible.builtin.command: sysctl --system
      changed_when: true
