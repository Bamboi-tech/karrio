# Deploy/update the Karrio stack on the staging or production VM.
#
# Required GitHub configuration:
#   Environments "staging" and "production", each with the secret:
#     ANSIBLE_VAULT_ENV_FILE — content of the (ansible-vault encrypted) ansible/vault/env/<env>.yaml
#   Repo (or environment) secrets:
#     ANSIBLE_VAULT_PASSWORD — the vault password (same as local .vault_pass)
#     SSH_PRIVATE_KEY        — private key matching the terraform ssh_public_key
name: Update Karrio (Ansible)

on:
  workflow_dispatch:
    inputs:
      env:
        description: Target environment (inventory group and vault)
        required: true
        type: choice
        options:
          - staging
          - production
      karrio_tag:
        description: Karrio image tag (leave empty to use the tag pinned in ansible/vars/<env>.yaml)
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ inputs.env }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy summary
        run: |
          echo "### Ansible deploy targets" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **env:** \`${{ inputs.env }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **karrio_tag:** \`${{ inputs.karrio_tag || 'pinned in vars/<env>.yaml' }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible, collections, and roles
        run: |
          pip install ansible
          ansible-galaxy install -r requirements.yaml

      - name: Write Ansible vault password
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          echo "$ANSIBLE_VAULT_PASSWORD" > .vault_pass
          chmod 600 .vault_pass

      # vault/ is gitignored (public fork) — materialize the encrypted vault file from the environment secret
      - name: Write Ansible vault env file
        env:
          ANSIBLE_VAULT_ENV_FILE: ${{ secrets.ANSIBLE_VAULT_ENV_FILE }}
        run: |
          mkdir -p vault/env
          printf '%s\n' "$ANSIBLE_VAULT_ENV_FILE" > "vault/env/${{ inputs.env }}.yaml"
          chmod 600 "vault/env/${{ inputs.env }}.yaml"

      - name: Install SSH key for Ansible
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Run google-vm playbook
        run: |
          EXTRA_ARGS=()
          if [ -n "${{ inputs.karrio_tag }}" ]; then
            EXTRA_ARGS+=(-e "karrio_tag=${{ inputs.karrio_tag }}")
          fi
          ansible-playbook google-vm.yaml \
            --private-key ~/.ssh/id_ed25519 \
            -e env=${{ inputs.env }} \
            "${EXTRA_ARGS[@]}"

      - name: Remove vault password and vault file
        if: always()
        run: rm -f .vault_pass "vault/env/${{ inputs.env }}.yaml"
